logging:
  file: logs/bot.log
  level: INFO
polymarket:
  clob_api_url: https://clob.polymarket.com
  gamma_api_url: https://gamma-api.polymarket.com
  assets:
  - btc
  - eth
  - sol
  - xrp
  intervals:
  - 5
  - 15
  fallback_windows: 1
risk:
  circuit_breaker_dd: 0.1
  max_daily_loss: 0.05
  max_position_size: 0.1
  max_risk_per_trade_usd: 10
filters:
  max_book_spread_bps: 500
  min_top_depth: 2
  min_top_notional: 0.5
  max_depth_ratio: 12
execution:
  paper_starting_bankroll: 500
  mm_paper_max_notional_usd: 6
  min_seconds_to_expiry_for_new_orders: 120
  quote_refresh_seconds: 5
  resolution_initial_poll_seconds: 10
  resolution_poll_cap_seconds: 300
strategies:
  # Only toxicity_mm is promoted to active. The others are research
  # candidates — keep them wired and tested, but only enable them once
  # runtime evidence earns promotion. See PLAN.md § strategy evolution.
  active:
  - toxicity_mm
  candidates:
  - mean_reversion_5min
  - opening_range
  - time_decay
  mean_reversion_5min:
    deviation_threshold: 0.03
    ema_period: 20
    ema_period_5m: 3
    ema_period_15m: 12
    imbalance_threshold: 0.1
    kelly_fraction: 0.25
    min_volume: 1000
    timeframes:
    - 5m
    - 15m
  toxicity_mm:
    kelly_fraction: 0.2
    max_position: 1000
    spread_multiplier: 1.5
    timeframes:
    - 5m
    - 15m
    vpin_threshold: 0.5
  opening_range:
    opening_range_ticks: 3
    breakout_pct: 0.3
    min_volume: 5000
    min_seconds_to_expiry_for_new_orders: 180
  time_decay:
    min_seconds_left: 10
    max_seconds_left: 60
    min_price: 0.55
    min_seconds_to_expiry_for_new_orders: 0
runtime:
  dir: data/runtime
telegram:
  enabled: false
