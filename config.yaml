logging:
  file: logs/bot.log
  level: INFO
polymarket:
  clob_api_url: https://clob.polymarket.com
  gamma_api_url: https://gamma-api.polymarket.com
  private_key: YOUR_PRIVATE_KEY
  wallet_address: YOUR_WALLET_ADDRESS
  assets:
  - btc
  - eth
  - sol
  - xrp
  intervals:
  - 5
  - 15
  fallback_windows: 1
risk:
  circuit_breaker_dd: 0.1
  max_daily_loss: 0.05
  max_position_size: 0.1
  max_risk_per_trade_usd: 10
filters:
  max_book_spread_bps: 250
  min_top_depth: 25
  min_top_notional: 10
  max_depth_ratio: 12
execution:
  paper_starting_bankroll: 500
  mm_paper_max_notional_usd: 5
  quote_refresh_seconds: 30
  resolution_initial_poll_seconds: 10
  resolution_poll_cap_seconds: 300
strategies:
  active:
  - mean_reversion_5min
  - toxicity_mm
  mean_reversion_5min:
    deviation_threshold: 0.08
    ema_period: 20
    imbalance_threshold: 0.3
    kelly_fraction: 0.25
    min_volume: 10000
    timeframes:
    - 5m
    - 15m
  toxicity_mm:
    kelly_fraction: 0.2
    max_position: 1000
    spread_multiplier: 1.5
    timeframes:
    - 5m
    - 15m
    vpin_threshold: 0.45
runtime:
  dir: data/runtime
telegram:
  bot_token: YOUR_BOT_TOKEN
  chat_id: YOUR_CHAT_ID
  enabled: true
